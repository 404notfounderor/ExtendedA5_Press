<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rishik's RageWire</title>
  <link rel="stylesheet" href="style.css">

  <!-- Google Identity -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <button id="menuBtn">☰</button>
  <div class="logo">Rishik's RageWire</div>

  <div id="userProfile" class="profile hidden">
    <img id="userPic" class="avatar">
    <div>
      <div id="userName"></div>
      <div id="userEmail" class="email"></div>
    </div>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h3>Menu</h3>

  <!-- GOOGLE CONFIG -->
  <div id="g_id_onload"
    data-client_id="443184962124-8oqbu500dal4g04a8ci9as6heuklacvj.apps.googleusercontent.com "
    data-callback="handleGoogleLogin"
    data-auto_prompt="false">
  </div>

  <!-- LOGIN BUTTON -->
  <div id="loginSidebar">
    <div class="g_id_signin"
      data-type="standard"
      data-shape="pill"
      data-theme="outline"
      data-size="large">
    </div>
  </div>

  <!-- HISTORY -->
  <div id="historySidebar" class="hidden">
    <h4>History</h4>
    <div id="historyList"></div>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay" class="overlay hidden"></div>

<!-- MAIN -->
<div id="main">

  <!-- LANDING -->
  <div id="landing" class="landing">
    <h1>Rishik RageWire</h1>
    <p>Login to begin</p>

    <div class="g_id_signin"
      data-type="standard"
      data-shape="pill"
      data-theme="filled_black"
      data-size="large">
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content" class="hidden content">
    <button id="generateBtn" class="generate-btn">Generate News</button>
    <div id="articles"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
