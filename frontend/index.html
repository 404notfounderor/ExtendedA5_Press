<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rishik's RageWire</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <button id="menuBtn">☰</button>
  <div class="logo">Rishik's RageWire</div>

  <div id="userProfile" class="profile hidden">
    <img id="userPic" class="avatar">
    <div>
      <div id="userName"></div>
      <div id="userEmail" class="email"></div>
    </div>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <button onclick="showPage('app')">🏠 Home</button>
  <button onclick="showPage('history')">🕘 History</button>

  <div id="loginSidebar">
    <div id="googleLoginSidebar" class="small-google">
      🔐 Sign in with Google
    </div>
  </div>

  <div id="historySidebar" class="hidden">
    <h4>History</h4>
    <div id="historyList"></div>
  </div>
</div>

<div id="overlay" class="overlay hidden"></div>

<!-- MAIN -->
<div id="main">

  <!-- HOME -->
  <div id="page-home" class="page">
    <div class="landing">
      <h1>Rishik's RageWire</h1>
      <p>Login to begin</p>
      <div id="googleLoginBtn" class="google-btn">
        🔐 Sign in with Google
      </div>
    </div>
  </div>

  <!-- APP -->
  <div id="page-app" class="page hidden">
    <button id="generateBtn" class="generate-btn">Generate News</button>
    <div id="articles"></div>
  </div>

  <!-- HISTORY -->
  <div id="page-history" class="page hidden">
    <h2>History</h2>
    <div id="historyThreads"></div>
    <div id="historyContent"></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
